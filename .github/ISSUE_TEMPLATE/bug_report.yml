name: Bug report
description: Report a reproducible issue with The Sound of Silence.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Clear reproduction details are the fastest path to a fix.

  - type: input
    id: foundry-version
    attributes:
      label: Foundry VTT version
      description: Include the full version number if possible.
      placeholder: "Example: v14.360"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: The Sound of Silence version
      description: You can find this in Foundry's Manage Modules or the module manifest.
      placeholder: "Example: 14.14.3"
    validations:
      required: true

  - type: textarea
    id: system-browser
    attributes:
      label: Game system, browser, and client details
      description: Include your Foundry game system, browser or desktop app, and OS if relevant.
      placeholder: |
        Game system:
        Browser or app:
        Operating system:
    validations:
      required: true

  - type: textarea
    id: audio-modules
    attributes:
      label: Active playlist/audio modules
      description: List other playlist, sound, audio, UI, or automation modules that may affect playback.
      placeholder: |
        Example:
        - libWrapper
        - Monks Sound Enhancements
        - Playlist Enchantment
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell me exactly what you clicked or configured before the issue happened.
      placeholder: |
        1. Create or open a playlist...
        2. Enable...
        3. Play...
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs or diagnostics
      description: Paste relevant console output, debug logs, or client diagnostics here.
      render: text

  - type: textarea
    id: media
    attributes:
      label: Screenshots, clips, or related settings
      description: Add screenshots, short clips, or notes about relevant playlist/sound settings.

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else you want to add?
      description: Use this space naturally if the form did not quite fit your situation.
